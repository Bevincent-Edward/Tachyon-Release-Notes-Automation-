services:
  # Backend Web Service
  - type: web
    name: tachyon-release-notes-backend
    env: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QUBRID_API_KEY
        sync: false
      - key: QUBRID_BASE_URL
        value: https://platform.qubrid.com/v1
      - key: QUBRID_MODEL
        value: openai/gpt-oss-20b
      - key: FRONTEND_URL
        value: https://tachyon-release-notes-frontend.onrender.com

  # Frontend Static Site
  - type: static
    name: tachyon-release-notes-frontend
    env: static
    region: oregon
    plan: starter
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://tachyon-release-notes-backend.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
