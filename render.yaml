services:
  - type: web
    name: tachyon-release-notes
    env: python
    region: oregon
    plan: starter
    runtime:
      runtime: python311
    rootDir: backend
    buildCommand: |
      export PIP_NO_BINARY=none &&
      export PIP_ONLY_BINARY=:all: &&
      pip install --no-cache-dir --upgrade pip &&
      pip install --no-cache-dir --only-binary :all: -r requirements.txt &&
      cd ../frontend &&
      npm install &&
      CI=false npm run build &&
      cp -r build .
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QUBRID_API_KEY
        sync: false
      - key: QUBRID_BASE_URL
        value: https://platform.qubrid.com/v1
      - key: QUBRID_MODEL
        value: openai/gpt-oss-20b
