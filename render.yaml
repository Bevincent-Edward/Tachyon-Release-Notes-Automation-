services:
  - type: web
    name: tachyon-release-notes-backend
    env: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QUBRID_API_KEY
        sync: false
      - key: QUBRID_BASE_URL
        value: https://platform.qubrid.com/v1
      - key: QUBRID_MODEL
        value: openai/gpt-oss-20b
    healthCheckPath: /api/health
    autoDeploy: true
