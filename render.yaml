services:
  - type: web
    name: tachyon-release-notes
    env: python
    region: oregon
    plan: starter
    runtime:
      runtime: python311
    buildCommand: |
      echo "=== INSTALLING PYTHON ===" &&
      python3 -m pip install --upgrade pip &&
      python3 -m pip install --only-binary :all: -r backend/requirements-render.txt &&
      echo "=== BUILDING FRONTEND ===" &&
      cd frontend &&
      npm install &&
      CI=false npm run build &&
      echo "=== FRONTEND BUILT ===" &&
      ls -la build/
    startCommand: python3 -m uvicorn backend.maincopy:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QUBRID_API_KEY
        sync: false
      - key: QUBRID_BASE_URL
        value: https://platform.qubrid.com/v1
      - key: QUBRID_MODEL
        value: openai/gpt-oss-20b
