services:
  - type: web
    name: tachyon-release-notes
    env: python
    region: oregon
    plan: starter
    rootDir: .
    buildCommand: |
      pip install -r backend/requirements.txt &&
      cd frontend &&
      npm install &&
      CI=false npm run build &&
      cp -r build ../backend/
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QUBRID_API_KEY
        sync: false
      - key: QUBRID_BASE_URL
        value: https://platform.qubrid.com/v1
      - key: QUBRID_MODEL
        value: openai/gpt-oss-20b
