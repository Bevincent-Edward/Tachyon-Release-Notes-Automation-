services:
  - type: web
    name: tachyon-release-notes
    env: python
    region: oregon
    plan: starter
    runtime:
      runtime: python311
    rootDir: backend
    buildCommand: |
      echo "=== Starting Build ===" &&
      export PIP_ONLY_BINARY=:all: &&
      echo "Installing Python dependencies..." &&
      pip install --upgrade pip &&
      pip install --only-binary :all: -r requirements-render.txt &&
      echo "Installing frontend dependencies..." &&
      cd ../frontend &&
      npm install &&
      echo "Building frontend..." &&
      CI=false npm run build &&
      echo "Copying build to backend..." &&
      ls -la &&
      cp -rv build ../backend/ &&
      echo "Build complete!" &&
      cd ../backend &&
      ls -la
    startCommand: python start.py
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: QUBRID_API_KEY
        sync: false
      - key: QUBRID_BASE_URL
        value: https://platform.qubrid.com/v1
      - key: QUBRID_MODEL
        value: openai/gpt-oss-20b
      - key: PORT
        value: "10000"
